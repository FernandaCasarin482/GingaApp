<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GINGA! – Ritmos" />
  <title>GINGA! – Ritmos</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>

  <div class="shell" role="main">
    <div class="screen ritmos-screen">
      
      <!-- ===== HEADER: Topbar ===== -->
      <header class="ginga-topbar">
        <button class="btn-back" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="ginga-topbar-title font-bebas">GINGA+</span>
        <div class="ginga-topbar-actions">
          <button class="btn-settings" aria-label="Configurações">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </button>
          <a href="perfil.html" class="user-avatar-wrap">
            <img src="IMG/BOI%20DAN%C3%87ANDO.png" alt="Avatar" class="user-avatar" />
            <span class="music-note-small avatar-note" aria-hidden="true"><img src="IMG/NOTA%20MUSICAL.png" alt="" /></span>
          </a>
        </div>
      </header>

      <main class="ritmos-main">
        
        <!-- ===== HERO AREA ===== -->
        <div class="ritmos-hero">
          <span class="music-note-small float-left-ritmo" aria-hidden="true"><img src="IMG/NOTA%20MUSICAL.png" alt="" style="height: 1.5em; width: auto; object-fit: contain;" /></span>
          
          <div class="ritmos-character-wrap" style="position: relative; display: inline-block;">
            <img src="IMG/BOI%20DAN%C3%87ANDO.png" alt="Seu Ginga" class="ritmos-hero-img anim-dance" />
            <a href="escolha-ginga.html" class="btn-cabide" aria-label="Mudar Ginga" style="position: absolute; bottom: 10px; right: -10px; width: 64px; height: 64px; background: var(--clr-bg-main); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--clr-red); box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; transition: transform 0.2s ease;">
              <!-- Hanger SVG Icon (Mais realista) -->
              <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v-1a2 2 0 1 0-2-2"></path><path d="M12 7L2.5 13a1.5 1.5 0 0 0 .8 2.7h17.4a1.5 1.5 0 0 0 .8-2.7L12 7z"></path></svg>
            </a>
          </div>

          <span class="music-note-small float-right-ritmo" aria-hidden="true"><img src="IMG/NOTA%20MUSICAL.png" alt="" style="height: 1.5em; width: auto; object-fit: contain;" /></span>

          <h1 class="font-bebas ritmos-title">VIBRE COM A DANÇA</h1>
          <p class="ritmos-subtitle">
            Sua jornada pelo movimento<br>brasileiro começa aqui.
          </p>
        </div>

        <!-- ===== RHYTHMS LIST ===== -->
        <div class="ritmos-list">
          
          <!-- Quadrilha -->
          <a href="trilha.html" class="ritmo-card ritmo-quadrilha">
            <img src="IMG/fundo_quadrilha.png" alt="" class="bg-quadrilha-full" />
            <div class="ritmo-card-content">
              <h2 class="font-bebas">QUADRILHA</h2>
              <p>FESTA & ALEGRIA</p>
            </div>
            <div class="ritmo-icon">
              <!-- Tent/House icon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </div>
          </a>

          <!-- Hip-Hop -->
          <a href="trilha-hiphop.html" class="ritmo-card ritmo-hiphop">
            <img src="IMG/cen%C3%A1rio%20hiphop.png" alt="" class="bg-quadrilha-full" />
            <div class="ritmo-card-content">
              <h2 class="font-bebas">HIP-HOP</h2>
              <p>ENERGIA URBANA</p>
            </div>
            <div class="ritmo-icon dark">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
            </div>
          </a>

          <!-- Dança Afro -->
          <a href="trilha-afro.html" class="ritmo-card ritmo-afro">
            <img src="IMG/cen%C3%A1rio%20afro.png" alt="" class="bg-quadrilha-full" />
            <div class="ritmo-card-content">
              <h2 class="font-bebas">DANÇA AFRO</h2>
              <p>ANCESTRAL & VIVO</p>
            </div>
            <div class="ritmo-icon dark">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
            </div>
          </a>

          <!-- Gaúcha -->
          <a href="trilha-gaucha.html" class="ritmo-card ritmo-gaucha">
            <img src="IMG/abertura%20gaucha.png" alt="" class="bg-quadrilha-full" />
            <div class="ritmo-card-content">
              <h2 class="font-bebas">GAÚCHA</h2>
              <p>FORÇA DO SUL</p>
            </div>
            <div class="ritmo-icon dark">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            </div>
          </a>

        </div>

      </main>

      <!-- ===== BOTTOM NAV BAR ===== -->
      <nav class="bottom-nav">
        <a href="ritmos.html" class="nav-item active">
          <div class="nav-icon-wrap">
            <img src="IMG/RITMOS.png" alt="Ritmos" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">RITMOS</span>
        </a>
        <a href="aprender.html" class="nav-item">
          <div class="nav-icon-wrap">
            <img src="IMG/APRENDER.png" alt="Aprender" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">APRENDER</span>
        </a>
        <a href="sobre.html" class="nav-item">
          <div class="nav-icon-wrap">
            <img src="IMG/SOBRE.png" alt="Sobre" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">SOBRE</span>
        </a>
      </nav>

    </div><!-- /.screen -->
  </div><!-- /.shell -->

  <script src="app.js"></script>
</body>
</html>
