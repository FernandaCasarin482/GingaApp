<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GINGA! – Aprender" />
  <title>GINGA! – Aprender</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="shell" role="main">
    <div class="screen aprender-screen">
      
      <!-- ===== HEADER: Topbar ===== -->
      <header class="ginga-topbar">
        <button class="btn-back" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--clr-red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="ginga-topbar-title font-bebas" style="color: var(--clr-red);">GINGA+</span>
        <div class="ginga-topbar-actions">
          <button class="btn-settings" aria-label="Configurações" style="color: var(--clr-red);">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </button>
          <a href="perfil.html" class="user-avatar-wrap">
            <img src="IMG/BOI%20DAN%C3%87ANDO.png" alt="Avatar" class="user-avatar" />
          </a>
        </div>
      </header>

      <main class="aprender-main">
        
        <!-- Header Text & Character -->
        <div class="aprender-header">
          <div class="aprender-text-col">
            <h2 class="aprender-subtitle">CAMINHOS DA HISTÓRIA</h2>
            <h1 class="font-bebas aprender-title">APRENDER</h1>
          </div>
          <div class="aprender-char-col">
            <img src="IMG/BOI%20BATENDO%20PALMA.png" alt="Boi" class="aprender-char-img anim-float-slow" />
          </div>
        </div>

        <!-- Chat Bubble -->
        <div class="chat-bubble">
          Oi! Sou o Boi-Bumbá. Vamos descobrir as danças que contam a história do nosso Brasil?
        </div>

        <!-- Horizontal Scroll Cards -->
        <div class="aprender-carousel-container">
          <div class="aprender-carousel">
            
            <!-- Card 1: Quadrilha -->
            <a href="historia-quadrilha.html" class="aprender-card">
              <img src="IMG/fundo_quadrilha.png" alt="" class="aprender-card-bg" />
              <div class="aprender-card-overlay"></div>
              <div class="aprender-play-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              </div>
              <div class="aprender-card-content">
                <h3 class="font-bebas">QUADRILHA</h3>
                <p>Do salão para a roça</p>
              </div>
            </a>

            <!-- Card 2: Hip-Hop -->
            <a href="historia-hiphop.html" class="aprender-card">
              <img src="IMG/cen%C3%A1rio%20hiphop.png" alt="" class="aprender-card-bg" />
              <div class="aprender-card-overlay"></div>
              <div class="aprender-play-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              </div>
              <div class="aprender-card-content">
                <h3 class="font-bebas">HIP-HOP</h3>
                <p>A voz das ruas</p>
              </div>
            </a>

            <!-- Card 3: Gaúcha -->
            <a href="historia-gaucha.html" class="aprender-card">
              <img src="IMG/abertura%20gaucha.png" alt="" class="aprender-card-bg" />
              <div class="aprender-card-overlay"></div>
              <div class="aprender-play-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              </div>
              <div class="aprender-card-content">
                <h3 class="font-bebas">GAÚCHA</h3>
                <p>Tradição e força</p>
              </div>
            </a>

            <!-- Card 4: Afro -->
            <a href="historia-afro.html" class="aprender-card">
              <img src="IMG/cen%C3%A1rio%20afro.png" alt="" class="aprender-card-bg" />
              <div class="aprender-card-overlay"></div>
              <div class="aprender-play-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              </div>
              <div class="aprender-card-content">
                <h3 class="font-bebas">AFRO</h3>
                <p>Raízes do movimento</p>
              </div>
            </a>

          </div>
        </div>

        <!-- Glossário -->
        <a href="glossario.html" class="glossario-card">
          <div class="glossario-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          </div>
          <div class="glossario-text">
            <h3 class="font-bebas">GLOSSÁRIO TÉCNICO</h3>
            <p>Termos fundamentais</p>
          </div>
          <div class="glossario-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </a>

      </main>

      <!-- ===== BOTTOM NAV BAR ===== -->
      <nav class="bottom-nav">
        <a href="ritmos.html" class="nav-item">
          <div class="nav-icon-wrap">
            <img src="IMG/RITMOS.png" alt="Ritmos" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">RITMOS</span>
        </a>
        <a href="aprender.html" class="nav-item active">
          <div class="nav-icon-wrap">
            <img src="IMG/APRENDER.png" alt="Aprender" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">APRENDER</span>
        </a>
        <a href="sobre.html" class="nav-item">
          <div class="nav-icon-wrap">
            <img src="IMG/SOBRE.png" alt="Sobre" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">SOBRE</span>
        </a>
      </nav>

    </div><!-- /.screen -->
  </div><!-- /.shell -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  <script src="supabase.js"></script>  <script src="app.js"></script>
</body>
</html>
