<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GINGA! – Perfil do Usuário" />
  <title>GINGA! – Perfil</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="shell" role="main">
    <div class="screen perfil-screen">
      
      <!-- ===== HEADER: Topbar ===== -->
      <header class="ginga-topbar">
        <button class="btn-back btn-back-to-ritmos" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--clr-red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="ginga-topbar-title font-bebas" style="color: var(--clr-red);">GINGA+</span>
        <div class="ginga-topbar-actions">
          <button class="btn-settings" aria-label="Configurações" style="color: var(--clr-red);">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </button>
          <div class="user-avatar-wrap">
            <img src="IMG/BOI%20DAN%C3%87ANDO.png" alt="Avatar" class="user-avatar" />
          </div>
        </div>
      </header>

      <main class="perfil-main-content">
        
        <!-- Profile Header Section -->
        <div class="perfil-header-section">
           <a href="escolha-ginga.html?from=perfil" style="text-decoration: none; cursor: pointer; display: inline-block;" title="Mudar Personagem">
             <div class="main-avatar-container">
                <div class="main-avatar-outer-ring">
                   <img src="IMG/BOI%20BATENDO%20PALMA.png" alt="Beatriz Oliveira" class="main-avatar-img" />
                </div>
                <!-- Alterei o ícone de check para um de edição (lápis) para ficar mais claro que é clicável para mudar -->
                <div class="avatar-badge-check" style="background: var(--clr-red);">
                   <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                </div>
             </div>
           </a>

           <div class="profile-title-row">
              <div class="pill-mestre font-bebas-ui">
                 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                 MESTRE DA GINGA
              </div>
              <a href="apelido.html?from=perfil" style="text-decoration: none; color: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;" title="Mudar Apelido">
                 <h1 class="font-bebas profile-name">BEATRIZ OLIVEIRA</h1>
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.6;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
              </a>
           </div>

           <div class="profile-stats-pills">
            <div class="stat-pill-red" id="profile-streak-pill">
               <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-4.42 0-8 3.58-8 8 0 5.25 7 13 8 13s8-7.75 8-13c0-4.42-3.58-8-8-8z"/></svg>
               <span id="profile-streak-count">0 dias</span>
            </div>
         </div>
        </div>

        <!-- Progress Cards Section -->
        <div class="perfil-progress-section">
           <!-- Troféus -->
           <div class="progress-card">
              <div class="progress-card-icon bg-gold-light">
                 <svg viewBox="0 0 24 24" fill="none" stroke="#B58A55" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34c0-.28-.11-.54-.3-.73L12 12.6l-1.7.93c-.19.19-.3.45-.3.73zM12 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/></svg>
              </div>
              <div class="progress-card-info">
                 <div class="progress-text-row">
                    <span class="progress-num font-bebas" id="profile-trophies-count">0 <small>DE 24</small></span>
                    <span class="progress-label font-bebas-ui">TROFÉUS E ESTRELAS COLETADOS</span>
                 </div>
                 <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="profile-trophies-bar" style="width: 0%; background: #B58A55;"></div>
                 </div>
              </div>
           </div>

           <!-- Módulos -->
           <div class="progress-card">
              <div class="progress-card-icon bg-red-light">
                 <svg viewBox="0 0 24 24" fill="none" stroke="var(--clr-red)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              </div>
              <div class="progress-card-info">
                 <div class="progress-text-row">
                    <span class="progress-num font-bebas" id="profile-modules-count">0 <small>DE 4</small></span>
                    <span class="progress-label font-bebas-ui">MÓDULOS CONCLUÍDOS</span>
                 </div>
                 <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="profile-modules-bar" style="width: 0%; background: var(--clr-red);"></div>
                 </div>
              </div>
           </div>
        </div>

        <!-- Achievements Section -->
        <div class="conquistas-section">
           <div class="conquistas-header">
              <h2 class="font-bebas text-red">SUAS CONQUISTAS</h2>
              <a href="conquistas.html" class="btn-ver-todas font-bebas-ui">Ver todas ></a>
           </div>

           <div class="conquistas-grid" id="perfil-conquistas-grid">
              <!-- Rendered dynamically by JS -->
           </div>
        </div>
        <div class="logout-container" style="margin: 30px 20px; text-align: center;">
          <button id="btnLogout" class="btn btn-secondary font-bebas" style="width: 100%; border-color: var(--clr-red); color: var(--clr-red);">
            SAIR DA CONTA
          </button>
        </div>

      </main>

      <!-- ===== BOTTOM NAV BAR ===== -->
      <nav class="bottom-nav">
        <a href="ritmos.html" class="nav-item">
          <div class="nav-icon-wrap">
            <img src="IMG/RITMOS.png" alt="Ritmos" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">RITMOS</span>
        </a>
        <a href="aprender.html" class="nav-item">
          <div class="nav-icon-wrap">
            <img src="IMG/APRENDER.png" alt="Aprender" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">APRENDER</span>
        </a>
        <a href="sobre.html" class="nav-item">
          <div class="nav-icon-wrap">
            <img src="IMG/SOBRE.png" alt="Sobre" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">SOBRE</span>
        </a>
      </nav>

    </div><!-- /.screen -->
  </div><!-- /.shell -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  <script src="supabase.js"></script>  <script src="app.js"></script>
</body>
</html>
