<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GINGA! – Mestre na Quadrilha" />
  <title>GINGA! – Recompensa Final</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Estilos específicos do confete para não poluir o style.css global com dezenas de animações variadas */
    .confetti-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: #f00;
      opacity: 0.8;
      top: -20px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(120vh) rotate(720deg);
      }
    }
  </style>
</head>

<body>

  <div class="shell" role="main">
    <div class="screen recompensa-screen">

      <div id="confetti-container" class="confetti-container"></div>

      <main class="recompensa-main">

        <div class="recompensa-hero">

          <div class="glow-bg"></div>

          <span class="music-note-small float-left-recompensa" aria-hidden="true" style="top: 20%; left: 10%;"><img
              src="IMG/NOTA%20MUSICAL.png" alt="" /></span>
          <span class="music-note-small float-right-recompensa" aria-hidden="true" style="top: 80%; right: 10%;"><img
              src="IMG/NOTA%20MUSICAL.png" alt="" /></span>
          <span class="music-note-small float-left-recompensa" aria-hidden="true"
            style="top: 70%; left: 80%; transform: scale(0.8);"><img src="IMG/NOTA%20MUSICAL.png" alt="" /></span>

          <!-- Personagem principal -->
          <img src="IMG/COMEMORAÇÃO.png" alt="Comemoração" class="recompensa-img anim-trophy-pop"
            style="width: 280px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));" />

        </div>

        <div class="recompensa-text anim-fade-up">
          <h1 class="font-bebas recompensa-title" style="font-size: 38px; line-height: 1.1;">VOCÊ É MESTRE
            NA<br>QUADRILHA! 🎊</h1>
          <div class="recompensa-subtitle-wrap" style="margin-top: 10px;">
            <p class="recompensa-subtitle" style="font-size: 14px;">
              Parabéns! Você completou toda a<br>coreografia e dominou o gingado junino<br>com excelência.
            </p>
          </div>
        </div>

        <div class="recompensa-action anim-fade-up-delay">
          <a href="ritmos.html" class="btn btn-primary-red font-bebas btn-continuar-final">
            <span class="btn-label">CONTINUAR <span class="arrow-right">→</span></span>
          </a>
        </div>

      </main>

    </div><!-- /.screen -->
  </div><!-- /.shell -->

  <script>
    // Gerador de confetes
    const container = document.getElementById('confetti-container');
    const colors = ['#B52026', '#F0C030', '#E88A4A', '#81C784', '#64B5F6', '#BA68C8'];
    const shapes = ['50%', '0%']; // Círculos e quadrados

    for (let i = 0; i < 80; i++) {
      const conf = document.createElement('div');
      conf.classList.add('confetti');

      // Randomizar propriedades
      conf.style.left = Math.random() * 100 + 'vw';
      conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      conf.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];

      const size = Math.random() * 8 + 6; // Entre 6px e 14px
      conf.style.width = size + 'px';
      conf.style.height = (size * (Math.random() > 0.5 ? 1 : 1.5)) + 'px'; // Alguns retângulos

      const animDuration = Math.random() * 3 + 3; // 3s a 6s
      const animDelay = Math.random() * 2; // 0s a 2s
      conf.style.animationDuration = animDuration + 's';
      conf.style.animationDelay = animDelay + 's';

      container.appendChild(conf);
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  <script src="supabase.js"></script>  <script src="app.js"></script>
</body>

</html>
