<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GINGA! – Suas Conquistas" />
  <title>GINGA! – Conquistas</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="shell" role="main">
    <div class="screen conquistas-screen">
      
      <!-- ===== HEADER: Topbar ===== -->
      <header class="ginga-topbar">
        <button class="btn-back" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="ginga-topbar-title font-bebas">CONQUISTAS</span>
        <div class="ginga-topbar-actions">
          <a href="perfil.html" class="user-avatar-wrap">
            <img src="IMG/BOI%20DAN%C3%87ANDO.png" alt="Avatar" class="user-avatar" />
          </a>
        </div>
      </header>

      <main class="conquistas-main-content">
        
        <!-- Summary Header -->
        <div class="conquistas-summary">
          <div class="conquistas-summary-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#F0C030" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34c0-.28-.11-.54-.3-.73L12 12.6l-1.7.93c-.19.19-.3.45-.3.73zM12 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/></svg>
          </div>
          <div class="conquistas-summary-info">
            <h2 class="font-bebas conquistas-summary-title">SUAS CONQUISTAS</h2>
            <p class="conquistas-summary-count" id="conquistas-count-text">0 de 6 desbloqueadas</p>
          </div>
        </div>

        <!-- Conquistas Full Grid -->
        <div class="conquistas-full-grid" id="conquistas-full-grid">
          <!-- Rendered dynamically by JS -->
        </div>

      </main>

      <!-- ===== BOTTOM NAV BAR ===== -->
      <nav class="bottom-nav">
        <a href="ritmos.html" class="nav-item">
          <div class="nav-icon-wrap">
            <img src="IMG/RITMOS.png" alt="Ritmos" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">RITMOS</span>
        </a>
        <a href="aprender.html" class="nav-item">
          <div class="nav-icon-wrap">
            <img src="IMG/APRENDER.png" alt="Aprender" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">APRENDER</span>
        </a>
        <a href="sobre.html" class="nav-item">
          <div class="nav-icon-wrap">
            <img src="IMG/SOBRE.png" alt="Sobre" class="nav-icon" />
          </div>
          <span class="nav-label font-bebas-ui">SOBRE</span>
        </a>
      </nav>

    </div><!-- /.screen -->
  </div><!-- /.shell -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  <script src="supabase.js"></script>  <script src="app.js"></script>

</body>
</html>
