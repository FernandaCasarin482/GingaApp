<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <script>if(localStorage.getItem('ginga_theme')==='dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GINGA! – Tela de Dança" />
  <title>GINGA! – Tela de Dança</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=639170776855048597" />
</head>

<body>

  <div class="shell" role="main">
    <div class="screen danca-screen">

      <!-- Placeholder Video Background -->
      <div class="video-placeholder"></div>

      <!-- Top UI Controls -->
      <div class="danca-top-controls">
        <button class="btn-danca-back" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>

        <!-- Indicador de Dificuldade (preenchido dinamicamente) -->
        <div class="difficulty-indicator" id="dancaDiffIndicator" style="position: static; flex: 0;"></div>

        <button class="btn-danca-pause" aria-label="Pausar">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
        </button>
      </div>

      <!-- Bottom UI Controls -->
      <div class="danca-bottom-controls">
        <div class="progress-container">
          <input type="range" class="progress-bar" value="30" min="0" max="100" />
          <div class="progress-time">
            <span>03:45</span>
            <span>12:00</span>
          </div>
        </div>
      </div>

      <!-- Exit Modal Overlay -->
      <div class="modal-overlay" id="exitModal">
        <div class="modal-content">
          <h2 class="font-bebas">SAIR DA AULA?</h2>
          <p>Tem certeza que quer sair? Seu progresso não será salvo.</p>
          <div class="modal-actions">
            <button class="btn btn-outline modal-btn-no">NÃO</button>
            <a href="#" onclick="event.preventDefault(); window.history.back();"
              class="btn btn-primary-red modal-btn-yes" style="text-decoration: none;">SIM</a>
          </div>
        </div>
      </div>

    </div><!-- /.screen -->
  </div><!-- /.shell -->

  <script src="app.js?v=2"></script>
</body>

</html>
